<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TAC Code Optimizer — apply classical compiler optimizations to Three-Address Code IR." />
  <title>TAC Code Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background decoration -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>

  <!-- ── Navbar ── -->
  <header class="navbar">
    <div class="navbar-brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      <span class="brand-name">TAC Optimizer</span>
      <span class="brand-badge">v1.1</span>
    </div>
    <div class="navbar-chips">
      <span class="chip">C++ Backend</span>
      <span class="chip">5 Passes</span>
      <span class="chip chip-live">● Live</span>
    </div>
  </header>

  <!-- ── Main grid ── -->
  <main class="workspace">

    <!-- Left: Input -->
    <section class="panel" id="input-panel">
      <div class="panel-head">
        <div class="panel-title">
          <span class="dot dot-blue"></span>
          <span>TAC Input</span>
        </div>
        <div class="panel-actions">
          <span class="line-count" id="line-count">0 lines</span>
          <button class="icon-btn" title="Load sample" id="btn-sample" onclick="loadSample()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </button>
          <button class="icon-btn" title="Clear" id="btn-clear" onclick="clearInput()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>
      </div>

      <div class="editor-wrap">
        <div class="line-nums" id="line-nums" aria-hidden="true">1</div>
        <textarea
          id="input"
          class="code-area"
          placeholder="Enter TAC code…&#10;&#10;  t1 = 5 + 3&#10;  t2 = t1 * 1&#10;  t3 = a + b&#10;  t4 = a + b&#10;  x  = t2 * 0&#10;  y  = t3 + 0"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
        ></textarea>
      </div>

      <div class="panel-foot">
        <span class="hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> to optimize</span>
      </div>
    </section>

    <!-- Center: Controls -->
    <div class="control-col">
      <button class="opt-btn" id="opt-btn" onclick="optimize()" aria-label="Optimize">
        <span class="opt-btn-inner">
          <svg class="opt-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg class="opt-check" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          <span class="opt-spinner" aria-hidden="true"></span>
        </span>
        <span class="opt-label">Optimize</span>
      </button>

      <ul class="pass-list" aria-label="Optimization passes">
        <li class="pass-item" id="p-cf">  <span class="pass-dot"></span>Const Fold</li>
        <li class="pass-item" id="p-as">  <span class="pass-dot"></span>Algebraic</li>
        <li class="pass-item" id="p-cp">  <span class="pass-dot"></span>Const Prop</li>
        <li class="pass-item" id="p-cse"> <span class="pass-dot"></span>CSE</li>
        <li class="pass-item" id="p-dce"> <span class="pass-dot"></span>Dead Code</li>
      </ul>
    </div>

    <!-- Right: Output -->
    <section class="panel" id="output-panel">
      <div class="panel-head">
        <div class="panel-title">
          <span class="dot dot-green"></span>
          <span>Pipeline Output</span>
        </div>
        <div class="panel-actions">
          <span class="stats-tag" id="stats-tag" hidden></span>
          <button class="icon-btn" title="Copy output" id="btn-copy" onclick="copyOutput()" hidden>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>

      <div class="out-body" id="out-body">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon" aria-hidden="true">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          </div>
          <p>Paste TAC code and click <strong>Optimize</strong></p>
          <p class="empty-sub">Output appears here, grouped by pipeline stage</p>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
